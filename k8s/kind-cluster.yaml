kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: my-app-cluster
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080   # frontend NodePort
        hostPort: 3000
        protocol: TCP
      - containerPort: 30800   # backend NodePort (opcional, para debug)
        hostPort: 8081
        protocol: TCP
