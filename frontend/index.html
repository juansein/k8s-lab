<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My App</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f4f8; }
    .card { background: white; padding: 2rem 3rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
    button { margin-top: 1rem; padding: 0.6rem 1.5rem; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #4338ca; }
    #response { margin-top: 1rem; color: #374151; font-size: 1.1rem; min-height: 1.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 My App</h1>
    <p>Frontend + FastAPI + Kubernetes</p>
    <button onclick="callBackend()">Call Backend</button>
    <div id="response"></div>
  </div>

  <script>
    const BACKEND_URL = window.BACKEND_URL || "http://localhost:8081";

    async function callBackend() {
      const el = document.getElementById("response");
      el.textContent = "Loading...";
      try {
        const res = await fetch(`${BACKEND_URL}/`);
        const data = await res.json();
        el.textContent = data.message;
      } catch (e) {
        el.textContent = "Error connecting to backend ❌";
      }
    }
  </script>
</body>
</html>
